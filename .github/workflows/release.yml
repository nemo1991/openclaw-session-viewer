name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.2.0). Leave empty to use push trigger."
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # tag runs should not be cancelled

permissions:
  contents: write

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # 不指定 node-version,使用 runner 默认(当前为 Node 24)
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Inject version from tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash .github/workflows/scripts/inject-version.sh

      - name: Build .app + .dmg
        run: pnpm tauri build

      - name: Upload .app (debug only, NOT for release)
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-macos
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # 不指定 node-version,使用 runner 默认(当前为 Node 24)
          cache: pnpm

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            file

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Inject version from tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash .github/workflows/scripts/inject-version.sh

      - name: Build AppImage + .deb
        run: pnpm tauri build

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # 不指定 node-version,使用 runner 默认(当前为 Node 24)
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: ilammy/msvc-dev-cmd@v1

      - run: pnpm install --frozen-lockfile

      - name: Inject version from tag
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash .github/workflows/scripts/inject-version.sh

      - name: Build .msi + .exe
        run: pnpm tauri build

      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload setup.exe
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract CHANGELOG section for this tag
        id: changelog
        continue-on-error: true
        env:
          GITHUB_REF_NAME: ${{ github.ref_name || inputs.tag || '' }}
          GITHUB_OUTPUT: ${{ github.output }}
        run: bash .github/workflows/scripts/extract-changelog.sh

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          set -euo pipefail
          find . -type f \
            \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \
              -o -name "*.msi" -o -name "*.exe" \) \
            -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt

      - name: Publish release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          draft: true
          fail_on_unmatched_files: true
          # 没 CHANGELOG 段时,让 GitHub 自动生成
          generate_release_notes: ${{ steps.changelog.outputs.body == '' }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/openclaw-session-viewer-dmg/*.dmg
            artifacts/openclaw-session-viewer-appimage/*.AppImage
            artifacts/openclaw-session-viewer-deb/*.deb
            artifacts/openclaw-session-viewer-msi/*.msi
            artifacts/openclaw-session-viewer-nsis/*.exe
            artifacts/SHA256SUMS.txt
