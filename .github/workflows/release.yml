name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # 不指定 node-version,使用 runner 默认(当前为 Node 24)
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build .app + .dmg
        run: pnpm tauri build

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-macos
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # 不指定 node-version,使用 runner 默认(当前为 Node 24)
          cache: pnpm

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            file

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build AppImage + .deb
        run: pnpm tauri build

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # 不指定 node-version,使用 runner 默认(当前为 Node 24)
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: ilammy/msvc-dev-cmd@v1

      - run: pnpm install --frozen-lockfile

      - name: Build .msi + .exe
        run: pnpm tauri build

      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload setup.exe
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-session-viewer-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/openclaw-session-viewer-dmg/*.dmg
            artifacts/openclaw-session-viewer-appimage/*.AppImage
            artifacts/openclaw-session-viewer-deb/*.deb
            artifacts/openclaw-session-viewer-msi/*.msi
            artifacts/openclaw-session-viewer-nsis/*.exe
            artifacts/openclaw-session-viewer-macos/*.app/**/*.app
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: false